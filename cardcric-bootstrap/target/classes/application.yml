server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:cardcric
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: c2VjdXJlLXNlY3JldC1rZXktZm9yLWNhcmRjcmljLWp3dC10b2tlbi0yMDI2
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
